name: Deploy Backend

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/backend/**'
      - '.github/workflows/deploy-backend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/backend/**'

env:
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: ${{ secrets.VPS_USER }}
  VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: nok_system_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: apps/backend/package-lock.json

    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    - name: Create test environment file
      run: |
        cat > .env << EOF
        NODE_ENV=test
        PORT=3000
        DB_HOST=localhost
        DB_PORT=5432
        DB_USERNAME=postgres
        DB_PASSWORD=password
        DB_DATABASE=nok_system_test
        JWT_SECRET=test_secret_key
        JWT_EXPIRES_IN=1h
        CORS_ORIGIN=http://localhost:4200
        EOF

    - name: Run tests
      run: npm test
      env:
        CI: true

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: apps/backend

    steps:
    - uses: actions/checkout@v4

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

    - name: Test SSH connection
      run: |
        ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 $VPS_USER@$VPS_HOST "echo 'SSH OK'" || {
          echo "SSH connection failed"
          exit 1
        }

    - name: Verify .env exists on server
      run: |
        ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST \
          "test -f /opt/nok-expert-backend/.env" || {
          echo "ERROR: /opt/nok-expert-backend/.env not found!"
          echo "Create it manually on the server first."
          exit 1
        }

    - name: Deploy to server
      run: |
        echo "Deploying to $VPS_HOST..."

        ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST "mkdir -p /opt/nok-expert-backend/postgres-init"

        # Upload source files for Docker build
        scp -o StrictHostKeyChecking=no -r \
          src/ package*.json tsconfig*.json nest-cli.json \
          docker-compose.prod.yml Dockerfile \
          $VPS_USER@$VPS_HOST:/opt/nok-expert-backend/

        # Build and restart
        ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST "
          cd /opt/nok-expert-backend &&
          docker compose -f docker-compose.prod.yml down --timeout 30 &&
          docker compose -f docker-compose.prod.yml up -d --build
        "

    - name: Health check
      run: |
        echo "Waiting 40s for services to start..."
        sleep 40
        curl -f https://nok-expert.ru/api/health || {
          echo "Health check failed — checking logs:"
          ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST \
            "cd /opt/nok-expert-backend && docker compose -f docker-compose.prod.yml logs --tail=100 nok-backend"
          exit 1
        }
        echo "Deploy successful!"

    - name: Cleanup old images
      run: |
        ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST "docker image prune -f" || true
