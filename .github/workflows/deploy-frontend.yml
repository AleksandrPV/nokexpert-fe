name: Deploy Frontend to VPS

on:
  push:
    branches: [ main, master ]
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'apps/frontend/**'
    types: [ closed ]

env:
  NODE_VERSION: '20'
  DOCKER_IMAGE_NAME: nokexpert-fe

permissions:
  contents: read
  packages: write

jobs:
  # Тестирование и сборка
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: apps/frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm run test:ci

    - name: Build for production
      run: npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: apps/frontend/dist/
        retention-days: 1

  # Сборка Docker образа
  build-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/aleksandrpv/${{ env.DOCKER_IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: apps/frontend
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Verify pushed image
      run: |
        echo "Docker image built and pushed successfully"
        echo "Tags: ${{ steps.meta.outputs.tags }}"
        docker pull ghcr.io/aleksandrpv/nokexpert-fe:latest

  # Деплой на VPS
  deploy:
    needs: [build-and-test, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh

        cat > ~/.ssh/id_rsa << 'EOF'
        -----BEGIN OPENSSH PRIVATE KEY-----
        ${{ secrets.VPS_SSH_KEY }}
        -----END OPENSSH PRIVATE KEY-----
        EOF

        chmod 600 ~/.ssh/id_rsa
        chmod 700 ~/.ssh

        echo "=== SSH Key Debug ==="
        echo "Key file size: $(wc -c < ~/.ssh/id_rsa)"
        echo "Key file lines: $(wc -l < ~/.ssh/id_rsa)"
        echo "First line: $(head -n1 ~/.ssh/id_rsa)"
        echo "Last line: $(tail -n1 ~/.ssh/id_rsa)"

        if ssh-keygen -y -f ~/.ssh/id_rsa > ~/.ssh/id_rsa.pub; then
          echo "SSH key validation successful"
          echo "Public key: $(cat ~/.ssh/id_rsa.pub)"
        else
          echo "SSH key validation failed"
          cat ~/.ssh/id_rsa
          exit 1
        fi

        ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to VPS
      run: |
        ssh -o ConnectTimeout=30 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa deploy@${{ secrets.VPS_HOST }} << 'EOF'
        echo "=== Deploying frontend ==="

        cd /opt/nokexpert-fe

        echo "Stopping old containers..."
        docker-compose down || true

        mkdir -p letsencrypt

        echo "Logging in to GitHub Registry..."
        echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

        echo "Pulling new image..."
        docker-compose pull

        echo "Starting containers..."
        docker-compose up -d

        echo "Waiting for startup..."
        sleep 30

        echo "Container status:"
        docker-compose ps

        echo "Traefik logs:"
        docker-compose logs --tail=10 traefik

        echo "App logs:"
        docker-compose logs --tail=10 nokexpert-fe

        if docker-compose ps | grep -q "(healthy)"; then
            echo "Application deployed successfully"
        else
            echo "Container health check failed"
            docker-compose logs --tail=50
            exit 1
        fi

        echo "Waiting for SSL certificates..."
        sleep 60

        if curl -f https://nok-expert.ru 2>/dev/null; then
            echo "HTTPS is working"
        else
            echo "HTTPS not ready yet, but HTTP works"
        fi

        docker system prune -f
        netstat -tlnp | grep -E ":(80|443|8080)"

        echo "Deploy completed: https://nok-expert.ru"
        EOF

  # Уведомления
  notify:
    needs: [deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Notify deployment status
      if: needs.deploy.result == 'success'
      run: |
        echo "Frontend deploy successful: https://nok-expert.ru"

    - name: Notify deployment failure
      if: needs.deploy.result == 'failure'
      run: |
        echo "Frontend deploy failed! Check logs and server configuration."
