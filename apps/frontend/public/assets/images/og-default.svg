<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2f4d"/>
      <stop offset="50%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#15304f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8604c"/>
      <stop offset="100%" style="stop-color:#e8604c;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb"/>
      <stop offset="100%" style="stop-color:#87ceeb;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8604c"/>
      <stop offset="100%" style="stop-color:#ff7e6b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#87ceeb" stroke-width="1" fill="none">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Decorative corner shapes -->
  <polygon points="0,0 200,0 0,120" fill="#87ceeb" opacity="0.06"/>
  <polygon points="1200,630 1000,630 1200,510" fill="#e8604c" opacity="0.06"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>

  <!-- Construction/Certification icon group (right side) -->
  <g transform="translate(880, 120)" opacity="0.9">
    <!-- Building outline -->
    <rect x="0" y="60" width="100" height="140" rx="4" fill="none" stroke="#87ceeb" stroke-width="3" opacity="0.7"/>
    <rect x="120" y="30" width="100" height="170" rx="4" fill="none" stroke="#87ceeb" stroke-width="3" opacity="0.5"/>
    <rect x="60" y="10" width="100" height="190" rx="4" fill="none" stroke="url(#iconGrad)" stroke-width="3"/>

    <!-- Windows on center building -->
    <rect x="78" y="35" width="18" height="18" rx="2" fill="#87ceeb" opacity="0.3"/>
    <rect x="105" y="35" width="18" height="18" rx="2" fill="#87ceeb" opacity="0.3"/>
    <rect x="78" y="65" width="18" height="18" rx="2" fill="#87ceeb" opacity="0.3"/>
    <rect x="105" y="65" width="18" height="18" rx="2" fill="#87ceeb" opacity="0.3"/>
    <rect x="78" y="95" width="18" height="18" rx="2" fill="#87ceeb" opacity="0.3"/>
    <rect x="105" y="95" width="18" height="18" rx="2" fill="#87ceeb" opacity="0.3"/>

    <!-- Windows on left building -->
    <rect x="16" y="85" width="14" height="14" rx="2" fill="#87ceeb" opacity="0.2"/>
    <rect x="40" y="85" width="14" height="14" rx="2" fill="#87ceeb" opacity="0.2"/>
    <rect x="16" y="110" width="14" height="14" rx="2" fill="#87ceeb" opacity="0.2"/>
    <rect x="40" y="110" width="14" height="14" rx="2" fill="#87ceeb" opacity="0.2"/>

    <!-- Certificate/checkmark badge -->
    <circle cx="190" cy="60" r="40" fill="#1e3a5f" stroke="url(#checkGrad)" stroke-width="3"/>
    <circle cx="190" cy="60" r="32" fill="none" stroke="#e8604c" stroke-width="1.5" opacity="0.4"/>
    <!-- Checkmark -->
    <polyline points="170,60 184,74 210,46" fill="none" stroke="#e8604c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Company name -->
  <text x="80" y="220" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="#f5f0e8" letter-spacing="2">
    НОК Эксперт
  </text>

  <!-- Coral underline accent -->
  <rect x="80" y="240" width="200" height="4" rx="2" fill="#e8604c"/>

  <!-- Tagline -->
  <text x="80" y="310" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#87ceeb" opacity="0.95">
    Гарантированная сдача независимой
  </text>
  <text x="80" y="350" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#87ceeb" opacity="0.95">
    оценки квалификации
  </text>

  <!-- Divider line -->
  <line x1="80" y1="400" x2="500" y2="400" stroke="#f5f0e8" stroke-width="1" opacity="0.15"/>

  <!-- Features row -->
  <g transform="translate(80, 430)" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#f5f0e8" opacity="0.6">
    <circle cx="8" cy="-5" r="4" fill="#e8604c" opacity="0.8"/>
    <text x="20" y="0">НОСТРОЙ</text>
    <circle cx="138" cy="-5" r="4" fill="#e8604c" opacity="0.8"/>
    <text x="150" y="0">НОПРИЗ</text>
    <circle cx="258" cy="-5" r="4" fill="#e8604c" opacity="0.8"/>
    <text x="270" y="0">Пожарная безопасность</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="540" width="1200" height="90" fill="#152d4a" opacity="0.7"/>

  <!-- Website URL -->
  <text x="80" y="595" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold" fill="#f5f0e8" letter-spacing="1">
    nok-expert.ru
  </text>

  <!-- Bottom right decorative element -->
  <g transform="translate(1020, 570)" opacity="0.4">
    <rect x="0" y="0" width="30" height="4" rx="2" fill="#e8604c"/>
    <rect x="40" y="0" width="30" height="4" rx="2" fill="#87ceeb"/>
    <rect x="80" y="0" width="30" height="4" rx="2" fill="#f5f0e8"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#accent)"/>
</svg>