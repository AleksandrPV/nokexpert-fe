<div class="relative w-full h-full">
  <!-- Map Container -->
  <div
    #mapContainer
    [id]="mapId"
    class="w-full h-full rounded-2xl overflow-hidden"
    [class.opacity-50]="isLoading">
  </div>

  <!-- Loading Overlay -->
  <div
    *ngIf="isLoading"
    class="absolute inset-0 flex items-center justify-center bg-slate-50 rounded-2xl">
    <div class="text-center">
      <div class="w-12 h-12 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin mx-auto mb-4"></div>
      <p class="text-sm text-slate-500">Загрузка карты...</p>
    </div>
  </div>

  <!-- Error State -->
  <div
    *ngIf="hasError && !isLoading"
    class="absolute inset-0 flex items-center justify-center bg-slate-50 rounded-2xl">
    <div class="text-center p-6">
      <div class="w-14 h-14 bg-red-50 rounded-xl flex items-center justify-center mx-auto mb-4 text-red-500">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
      </div>
      <h3 class="text-lg font-semibold text-slate-900 mb-2">Не удалось загрузить карту</h3>
      <p class="text-sm text-slate-500 mb-4">Проверьте подключение к интернету</p>
      <button
        (click)="retryLoadMap()"
        class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-lg text-sm font-semibold transition-colors">
        Попробовать снова
      </button>
    </div>
  </div>

  <!-- Map Controls Overlay -->
  <div
    *ngIf="!isLoading && !hasError && showControls"
    class="absolute bottom-4 left-4 right-4 flex justify-between items-end">

    <!-- Info Card -->
    <div class="bg-white/95 backdrop-blur-sm rounded-xl p-4 shadow-lg max-w-xs ring-1 ring-slate-200/50">
      <h4 class="font-semibold text-slate-900">{{ officeTitle }}</h4>
      <p class="text-sm text-slate-500">{{ officeAddress }}</p>
      <div class="flex gap-2 mt-3">
        <button
          (click)="openInYandexMaps()"
          class="text-xs bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg hover:bg-blue-100 transition-colors font-medium">
          Маршрут
        </button>
        <button
          (click)="centerOnOffice()"
          class="text-xs bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg hover:bg-slate-200 transition-colors font-medium">
          Центрировать
        </button>
      </div>
    </div>

    <!-- Zoom Controls -->
    <div class="bg-white/95 backdrop-blur-sm rounded-xl shadow-lg overflow-hidden ring-1 ring-slate-200/50">
      <button
        (click)="zoomIn()"
        class="block w-10 h-10 flex items-center justify-center text-slate-700 hover:bg-slate-50 transition-colors border-b border-slate-200">
        <span class="text-lg font-bold">+</span>
      </button>
      <button
        (click)="zoomOut()"
        class="block w-10 h-10 flex items-center justify-center text-slate-700 hover:bg-slate-50 transition-colors">
        <span class="text-lg font-bold">−</span>
      </button>
    </div>
  </div>
</div>
