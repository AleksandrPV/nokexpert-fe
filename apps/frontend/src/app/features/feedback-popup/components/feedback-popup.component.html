<!-- Popup Overlay -->
<div 
  *ngIf="isVisible()"
  class="fixed inset-0 z-50 flex items-center justify-center p-4 animate-fade-in"
  (click)="onBackdropClick($event)">
  
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
  
  <!-- Popup Container -->
  <div 
    class="relative w-full max-w-lg bg-white rounded-3xl shadow-2xl border border-gray-100 animate-scale-in overflow-hidden"
    (click)="$event.stopPropagation()">
    
    <!-- Close Button -->
    <button
      (click)="close()"
      aria-label="Закрыть форму"
      class="absolute top-6 right-6 w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600 hover:text-gray-800 transition-all duration-200 z-10">
      <span class="text-lg leading-none" aria-hidden="true">×</span>
    </button>
    
    <!-- Header -->
    <div class="px-6 pt-6 pb-4 text-center">
      <div class="w-12 h-12 mx-auto mb-3 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
      </div>
      <h2 class="text-2xl font-bold text-slate-900 mb-2">{{ config().title }}</h2>
      <p class="text-sm text-slate-900/70 leading-relaxed">{{ config().subtitle }}</p>
    </div>
    
    <!-- Form -->
    <div class="px-6 pb-6">
      <form (ngSubmit)="onSubmit()" class="space-y-4">
        <!-- Name and Email Row -->
        <div class="grid md:grid-cols-2 gap-4">
          <div class="space-y-2">
            <label class="text-sm font-medium text-slate-900/80">Имя *</label>
            <input 
              type="text" 
              [(ngModel)]="formData().name"
              name="name"
              required
              [disabled]="isSubmitting()"
              class="w-full px-3 py-2 rounded-lg border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-transparent focus:bg-white transition-all text-slate-900 placeholder-gray-400"
              placeholder="Ваше имя">
          </div>
          <div class="space-y-2">
            <label class="text-sm font-medium text-slate-900/80">Email</label>
            <input
              type="email"
              [(ngModel)]="formData().email"
              name="email"
              [disabled]="isSubmitting()"
              class="w-full px-3 py-2 rounded-lg border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-transparent focus:bg-white transition-all text-slate-900 placeholder-gray-400"
              placeholder="your@email.com">
          </div>
        </div>

        <!-- Phone -->
        <div class="space-y-2">
          <label class="text-sm font-medium text-slate-900/80">Телефон</label>
          <input 
            type="tel" 
            [(ngModel)]="formData().phone"
            name="phone"
            [disabled]="isSubmitting()"
            class="w-full px-3 py-2 rounded-lg border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-transparent focus:bg-white transition-all text-slate-900 placeholder-gray-400"
            placeholder="+7 (___) ___-__-__">
        </div>

        <!-- Subject -->
        <div class="space-y-2">
          <label class="text-sm font-medium text-slate-900/80">Тема обращения</label>
          <select 
            [(ngModel)]="formData().subject"
            name="subject"
            [disabled]="isSubmitting()"
            class="w-full px-3 py-2 rounded-lg border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-transparent focus:bg-white transition-all text-slate-900">
            <option value="">Выберите тему</option>
            <option 
              *ngFor="let option of subjectOptions" 
              [value]="option.value">
              {{ option.label }}
            </option>
          </select>
        </div>

        <!-- Message -->
        <div class="space-y-2">
          <label class="text-sm font-medium text-slate-900/80">Сообщение</label>
          <textarea
            [(ngModel)]="formData().message"
            name="message"
            [disabled]="isSubmitting()"
            rows="3"
            class="w-full px-3 py-2 rounded-lg border border-gray-200 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-transparent focus:bg-white transition-all resize-none text-slate-900 placeholder-gray-400"
            placeholder="Расскажите о вашем вопросе или проблеме..."></textarea>
        </div>

        <!-- Privacy -->
        <div class="flex items-start gap-3">
          <input 
            type="checkbox" 
            [(ngModel)]="formData().privacy"
            name="privacy"
            required
            [disabled]="isSubmitting()"
            class="mt-1 w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500/30">
          <label class="text-sm text-slate-900/70 leading-relaxed">
            Я согласен с 
            <a routerLink="/privacy-policy" class="text-blue-600 hover:underline font-medium">политикой конфиденциальности</a> 
            и обработкой персональных данных
          </label>
        </div>

        <!-- Error Message -->
        <div 
          *ngIf="submitResult() && !submitResult()?.success" 
          class="p-3 bg-red-50 border border-red-200 rounded-lg">
          <div class="flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-500 shrink-0"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
            <div>
              <p class="text-red-800 font-medium">Ошибка</p>
              <p class="text-red-700 text-sm">{{ submitResult()?.error || submitResult()?.message }}</p>
            </div>
          </div>
        </div>

        <!-- Success Message -->
        <div 
          *ngIf="submitResult() && submitResult()?.success" 
          class="p-3 bg-green-50 border border-green-200 rounded-lg">
          <div class="flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500 shrink-0"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <div>
              <p class="text-green-800 font-medium">Успешно отправлено!</p>
              <p class="text-green-700 text-sm">{{ submitResult()?.message }}</p>
            </div>
          </div>
        </div>

        <!-- Submit Button -->
        <div class="pt-2">
          <button 
            type="submit"
            [disabled]="isSubmitting() || (submitResult() && submitResult()?.success)"
            class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-semibold transition-all duration-300 hover:shadow-lg hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none shadow-md">
            
            <span *ngIf="!isSubmitting() && (!submitResult() || !submitResult()?.success)" class="flex items-center justify-center gap-2">
              <span>Отправить сообщение</span>
            </span>
            
            <span *ngIf="isSubmitting()" class="flex items-center justify-center gap-3">
              <div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
              <span>Отправляем...</span>
            </span>
            
            <span *ngIf="submitResult() && submitResult()?.success" class="flex items-center justify-center gap-2">
              <span>Отправлено</span>
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
