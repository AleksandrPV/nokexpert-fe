services:
  nok-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nok-backend
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - frontend_network
      - nok_internal
    labels:
      - "traefik.enable=true"
      # HTTPS route for /api/*
      - "traefik.http.routers.nok-backend-https.rule=Host(`nok-expert.ru`) && PathPrefix(`/api`)"
      - "traefik.http.routers.nok-backend-https.entrypoints=websecure"
      - "traefik.http.routers.nok-backend-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nok-backend-https.priority=100"
      - "traefik.http.services.nok-backend.loadbalancer.server.port=3000"
      - "traefik.docker.network=nokexpert-fe_nokexpert-network"
      # HTTP route (redirects to HTTPS via existing middleware)
      - "traefik.http.routers.nok-backend-http.rule=Host(`nok-expert.ru`) && PathPrefix(`/api`)"
      - "traefik.http.routers.nok-backend-http.entrypoints=web"
      - "traefik.http.routers.nok-backend-http.middlewares=redirect-to-https"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: nok-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - nok_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  backend_logs:
    driver: local

networks:
  frontend_network:
    name: nokexpert-fe_nokexpert-network
    external: true
  nok_internal:
    driver: bridge
